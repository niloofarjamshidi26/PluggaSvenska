<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>svenska 🇸🇪</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="svenska" />
  <meta name="theme-color" content="#0d1117" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(160deg, #0d1117 0%, #111827 60%, #0d1f2d 100%);
      color: #e0e0e0;
      font-family: Georgia, serif;
      min-height: 100vh;
      padding-bottom: 40px;
    }
    .page { max-width: 480px; margin: 0 auto; }
    .header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      position: sticky;
      top: 0;
      background: rgba(13,17,23,0.97);
      z-index: 10;
    }
    .header-top { display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 20px; font-weight: 700; color: #82E0AA; letter-spacing: 0.05em; }
    .affirmation {
      margin-top: 12px;
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      font-style: italic;
      border-left: 2px solid #E8A87C;
      padding-left: 10px;
      line-height: 1.5;
      direction: rtl;
    }
    .progress-section { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .progress-label { font-size: 11px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; direction: rtl; }
    .progress-bar-bg { height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #82E0AA, #E8A87C); border-radius: 3px; transition: width 0.4s ease; }
    .progress-stats { display: flex; gap: 16px; margin-top: 8px; }
    .stat { font-size: 12px; color: rgba(255,255,255,0.4); direction: rtl; }
    .stat span { color: #E8A87C; font-weight: 700; }
    .goals { display: flex; gap: 8px; flex-wrap: wrap; padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .goal-chip {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px; padding: 5px 12px;
      font-size: 12px; color: rgba(255,255,255,0.6);
    }
    .topic { margin: 12px 16px; border-radius: 14px; overflow: hidden; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); }
    .topic-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; cursor: pointer;
      user-select: none;
    }
    .topic-icon { font-size: 20px; }
    .topic-title { flex: 1; font-size: 15px; font-weight: 600; color: #f0f0f0; text-align: left; }
    .topic-count { font-size: 12px; color: rgba(255,255,255,0.3); }
    .topic-arrow { font-size: 16px; color: rgba(255,255,255,0.3); transition: transform 0.2s; }
    .topic-arrow.open { transform: rotate(90deg); }
    .topic-mini-bar { height: 3px; background: rgba(255,255,255,0.06); }
    .topic-mini-fill { height: 100%; background: #82E0AA; transition: width 0.3s; }
    .items { display: none; padding: 4px 0 10px; }
    .items.open { display: block; }
    .item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 10px 16px; cursor: pointer;
      border-top: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
    }
    .item:active { background: rgba(255,255,255,0.04); }
    .checkbox {
      width: 20px; height: 20px; border-radius: 6px; flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; margin-top: 1px;
      transition: all 0.2s;
    }
    .checkbox.checked { background: #82E0AA; border-color: #82E0AA; color: #0d1117; font-weight: 700; }
    .item-content { flex: 1; }
    .item-title { font-size: 13px; color: rgba(255,255,255,0.8); line-height: 1.4; text-align: left; direction: ltr; }
    .item-title.done { color: rgba(255,255,255,0.3); text-decoration: line-through; }
    .item-hint { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 3px; text-align: left; direction: ltr; font-style: italic; }
    .reset-btn {
      display: block; margin: 20px auto 0;
      background: none; border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.3); padding: 8px 20px;
      border-radius: 20px; cursor: pointer; font-size: 12px; font-family: inherit;
    }
    .reset-btn:active { background: rgba(255,255,255,0.05); }
  </style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="header-top">
      <div class="logo">svenska 🇸🇪</div>
      <div id="pct-label" style="font-size:13px;color:#E8A87C;font-weight:700;">0%</div>
    </div>
    <div class="affirmation" id="affirmation"></div>
  </div>

  <div class="progress-section">
    <div class="progress-label">پیشرفت کلی</div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="main-bar" style="width:0%"></div></div>
    <div class="progress-stats">
      <div class="stat">تموم شده: <span id="done-count">0</span></div>
      <div class="stat">کل: <span id="total-count">0</span></div>
    </div>
  </div>

  <div class="goals">
    <div class="goal-chip">💼 کار جنرال</div>
    <div class="goal-chip">🚗 گواهینامه</div>
    <div class="goal-chip">🏊 مربی شنا</div>
    <div class="goal-chip">📚 SFI Level D</div>
  </div>

  <div id="topics-container"></div>
  <button class="reset-btn" onclick="resetAll()">شروع از اول</button>
</div>

<script>
const AFFIRMATIONS = [
  "بدون فکر اضافه — شروع کن، بقیه‌اش میاد.",
  "هیچ‌کس اول عالی نیست. تو هم نباید باشی.",
  "امروز یه قدم واقعی بهتر از ده تا برنامه ذهنیه.",
  "just do it — مغزت بعداً میفهمه که درست بوده.",
  "ریسک کن. بدترین چیزی که میشه اینه که یاد میگیری.",
  "perfectionism یه دروغه. شروع کردن، حقیقته.",
  "هر تیکی که میزنی، یه در باز میشه.",
  "اوپسالا رو انتخاب کردی. این زبانم همینه.",
];

const TOPICS = [
  {
    id: "verbs",
    icon: "⚡",
    title: "Verb & Tempus",
    items: [
      { id: "v1", text: "Presens", hint: "skriver, läser, är, har, går, kommer" },
      { id: "v2", text: "Preteritum (dåtid)", hint: "skrev, läste, var, hade, gick, kom" },
      { id: "v3", text: "Perfekt", hint: "har skrivit, har läst, har varit, har haft" },
      { id: "v4", text: "Pluskvamperfekt", hint: "hade skrivit, hade läst, hade varit" },
      { id: "v5", text: "Futurum", hint: "ska, kommer att, tänker + infinitiv" },
      { id: "v6", text: "Imperativ", hint: "Skriv! Läs! Kom! Gå!" },
      { id: "v7", text: "Verb grupper 1-4", hint: "grupp 1: -ar, grupp 2: -er, grupp 3: -r, grupp 4: oregelbundna" },
      { id: "v8", text: "Modala hjälpverb", hint: "kan, ska, vill, måste, får, borde" },
    ]
  },
  {
    id: "bestamd",
    icon: "🔵",
    title: "Bestämd / Obestämd form",
    items: [
      { id: "b1", text: "En-ord obestämd singular", hint: "en bil, en stol, en katt, en dag" },
      { id: "b2", text: "En-ord bestämd singular", hint: "bilen, stolen, katten, dagen" },
      { id: "b3", text: "Ett-ord obestämd singular", hint: "ett hus, ett bord, ett barn, ett år" },
      { id: "b4", text: "Ett-ord bestämd singular", hint: "huset, bordet, barnet, året" },
      { id: "b5", text: "Obestämd plural", hint: "bilar, stolar, hus, barn, böcker" },
      { id: "b6", text: "Bestämd plural", hint: "bilarna, stolarna, husen, barnen, böckerna" },
      { id: "b7", text: "Dubbel bestämdhet", hint: "den stora bilen, det gamla huset, de nya bilarna" },
    ]
  },
  {
    id: "plural",
    icon: "🌿",
    title: "Pluralformer",
    items: [
      { id: "p1", text: "Grupp 1: -or", hint: "en flicka → flickor, en skola → skolor" },
      { id: "p2", text: "Grupp 2: -ar", hint: "en bil → bilar, en dag → dagar, en hand → händer" },
      { id: "p3", text: "Grupp 3: -er", hint: "en bok → böcker, en stad → städer, en natt → nätter" },
      { id: "p4", text: "Grupp 4: -n", hint: "ett äpple → äpplen, ett ögon → ögon" },
      { id: "p5", text: "Grupp 5: oförändrat", hint: "ett hus → hus, ett barn → barn, ett år → år" },
      { id: "p6", text: "Oregelbunden plural", hint: "en man → män, en mus → möss, ett träd → träd" },
    ]
  },
  {
    id: "adjektiv",
    icon: "🎨",
    title: "Adjektiv",
    items: [
      { id: "a1", text: "Grundform en-ord", hint: "en stor bil, en röd stol, en gammal man" },
      { id: "a2", text: "Grundform ett-ord: +t", hint: "ett stort hus, ett rött bord, ett gammalt barn" },
      { id: "a3", text: "Plural / bestämd form: +a", hint: "stora bilar, det stora huset, de gamla männen" },
      { id: "a4", text: "Komparativ: -are", hint: "stor → större, gammal → äldre, bra → bättre" },
      { id: "a5", text: "Superlativ: -ast", hint: "stor → störst, gammal → äldst, bra → bäst" },
      { id: "a6", text: "Oregelbundna adjektiv", hint: "liten → litet → lilla / små, egen → eget → egna" },
    ]
  },
  {
    id: "tid",
    icon: "🕐",
    title: "Siffror & Tid",
    items: [
      { id: "t1", text: "Siffror 0–20", hint: "noll, ett, två, tre... tjugo" },
      { id: "t2", text: "Tiotal 20–100", hint: "tjugo, trettio, fyrtio, femtio, sextio, sjuttio, åttio, nittio, hundra" },
      { id: "t3", text: "Ordningstal", hint: "första, andra, tredje, fjärde, femte, sjätte..." },
      { id: "t4", text: "Klockan — hel och halv", hint: "klockan tre, halv fyra (= 15:30)" },
      { id: "t5", text: "Klockan — kvart", hint: "kvart i fem (16:45), kvart över sex (18:15)" },
      { id: "t6", text: "Klockan — minuter", hint: "tio i sju (18:50), fem över åtta (20:05)" },
      { id: "t7", text: "Dagar & månader", hint: "måndag...söndag / januari...december" },
      { id: "t8", text: "Datum", hint: "den femtonde maj, den första januari" },
    ]
  }
];

const KEY = "sv_checklist_v1";
let state = {};

function load() {
  try { state = JSON.parse(localStorage.getItem(KEY)) || {}; } catch { state = {}; }
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(state)); } catch {}
}
function isChecked(topicId, itemId) { return !!(state[topicId] && state[topicId][itemId]); }
function toggle(topicId, itemId) {
  if (!state[topicId]) state[topicId] = {};
  state[topicId][itemId] = !state[topicId][itemId];
  save();
  render();
}
function resetAll() {
  if (confirm("همه تیک‌ها پاک بشن؟")) { state = {}; save(); render(); }
}

function render() {
  let totalDone = 0, totalAll = 0;
  TOPICS.forEach(topic => {
    const done = topic.items.filter(i => isChecked(topic.id, i.id)).length;
    const all = topic.items.length;
    totalDone += done; totalAll += all;

    // mini bar
    const bar = document.getElementById("mini-" + topic.id);
    if (bar) bar.style.width = (all ? Math.round(done/all*100) : 0) + "%";

    // count
    const cnt = document.getElementById("cnt-" + topic.id);
    if (cnt) cnt.textContent = done + "/" + all;

    // items
    topic.items.forEach(item => {
      const cb = document.getElementById("cb-" + item.id);
      const tt = document.getElementById("tt-" + item.id);
      if (cb) { cb.textContent = isChecked(topic.id, item.id) ? "✓" : ""; cb.className = "checkbox" + (isChecked(topic.id, item.id) ? " checked" : ""); }
      if (tt) { tt.className = "item-title" + (isChecked(topic.id, item.id) ? " done" : ""); }
    });
  });

  const pct = totalAll ? Math.round(totalDone/totalAll*100) : 0;
  document.getElementById("main-bar").style.width = pct + "%";
  document.getElementById("pct-label").textContent = pct + "%";
  document.getElementById("done-count").textContent = totalDone;
  document.getElementById("total-count").textContent = totalAll;
}

function buildUI() {
  document.getElementById("affirmation").textContent = AFFIRMATIONS[Math.floor(Math.random() * AFFIRMATIONS.length)];
  const container = document.getElementById("topics-container");
  container.innerHTML = "";

  TOPICS.forEach(topic => {
    const div = document.createElement("div");
    div.className = "topic";
    const done = topic.items.filter(i => isChecked(topic.id, i.id)).length;
    const pct = Math.round(done/topic.items.length*100);

    div.innerHTML = `
      <div class="topic-header" onclick="toggleTopic('${topic.id}')">
        <span class="topic-icon">${topic.icon}</span>
        <span class="topic-title">${topic.title}</span>
        <span class="topic-count" id="cnt-${topic.id}">${done}/${topic.items.length}</span>
        <span class="topic-arrow" id="arrow-${topic.id}">›</span>
      </div>
      <div class="topic-mini-bar"><div class="topic-mini-fill" id="mini-${topic.id}" style="width:${pct}%"></div></div>
      <div class="items" id="items-${topic.id}">
        ${topic.items.map(item => `
          <div class="item" onclick="toggle('${topic.id}', '${item.id}')">
            <div class="checkbox ${isChecked(topic.id, item.id) ? 'checked' : ''}" id="cb-${item.id}">${isChecked(topic.id, item.id) ? '✓' : ''}</div>
            <div class="item-content">
              <div class="item-title ${isChecked(topic.id, item.id) ? 'done' : ''}" id="tt-${item.id}">${item.text}</div>
              <div class="item-hint">${item.hint}</div>
            </div>
          </div>
        `).join("")}
      </div>
    `;
    container.appendChild(div);
  });
}

function toggleTopic(id) {
  const items = document.getElementById("items-" + id);
  const arrow = document.getElementById("arrow-" + id);
  const open = items.classList.toggle("open");
  arrow.classList.toggle("open", open);
}

load();
buildUI();
render();
</script>
</body>
</html>
