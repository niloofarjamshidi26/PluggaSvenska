<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>svenska 🇸🇪</title>

  <!-- PWA / iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="svenska" />
  <meta name="theme-color" content="#0d1117" />
  <link rel="manifest" href="manifest.json" />

  <!-- iOS home screen icon (generated inline as SVG → PNG via canvas) -->
  <link rel="apple-touch-icon" href="icon-180.png" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; }
    @keyframes spin { to { transform: rotate(360deg); } }
    input:focus { outline: none; }
    button:hover { opacity: 0.85; }
    /* iOS safe area padding */
    #root { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const TOPICS = [
      { id: "verbs",    label: "Verb & Tempus",       icon: "⚡", desc: "presens, preteritum, perfekt, futurum" },
      { id: "bestamd",  label: "Bestämd / Obestämd",  icon: "🔵", desc: "en bil / bilen / ett hus / huset" },
      { id: "plural",   label: "Pluralformer",         icon: "🌿", desc: "grupp 1–5, obestämd & bestämd plural" },
      { id: "adjektiv", label: "Adjektiv",             icon: "🎨", desc: "kongruens, komparation" },
      { id: "tid",      label: "Siffror & Tid",        icon: "🕐", desc: "klockan, datum, räkneord" },
    ];

    const GOALS = [
      { id: "job",   label: "کار جنرال",  icon: "💼" },
      { id: "drive", label: "گواهینامه", icon: "🚗" },
      { id: "swim",  label: "مربی شنا",  icon: "🏊" },
      { id: "sfi",   label: "SFI Level D", icon: "📚" },
    ];

    const AFFIRMATIONS = [
      "بدون فکر اضافه — شروع کن، بقیه‌اش میاد.",
      "هیچ‌کس اول عالی نیست. تو هم نباید باشی.",
      "امروز یه قدم واقعی بهتر از ده تا برنامه ذهنیه.",
      "just do it — مغزت بعداً میفهمه که درست بوده.",
      "ریسک کن. بدترین چیزی که میتونه بشه اینه که یاد میگیری.",
      "اوپسالا یه جا بود که انتخاب کردی. این زبانم همینه.",
      "perfectionism یه دروغه. شروع کردن، حقیقته.",
      "هر تمرینی که میزنی، یه در باز میشه.",
    ];

    const STORAGE_KEY = "sv_practice_v2";

    function getStorage() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
    }
    function setStorage(data) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
    }
    function todayStr() { return new Date().toISOString().slice(0, 10); }
    function monthStr() { return new Date().toISOString().slice(0, 7); }
    function weekKey() {
      const d = new Date(); const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      return new Date(new Date().setDate(new Date().getDate() - day + (day === 0 ? -6 : 1))).toISOString().slice(0, 10);
    }

    // ── MAIN ──
    function App() {
      const [screen, setScreen] = useState("home");
      const [selectedTopic, setSelectedTopic] = useState(null);
      const [affIdx] = useState(() => Math.floor(Math.random() * AFFIRMATIONS.length));
      const [storage, setStorageState] = useState(getStorage);

      function saveStorage(updated) {
        setStorage(updated);
        setStorageState(updated);
      }

      const today = storage.days?.[todayStr()] || { sessions: 0, correct: 0, total: 0 };
      const thisWeek = Object.entries(storage.days || {})
        .filter(([k]) => k >= weekKey())
        .reduce((a, [, v]) => ({ sessions: a.sessions + v.sessions, correct: a.correct + v.correct, total: a.total + v.total }), { sessions: 0, correct: 0, total: 0 });
      const months = storage.months || {};

      function onSessionDone(topicId, correct, total) {
        const d = todayStr(); const m = monthStr();
        const prev = storage.days?.[d] || { sessions: 0, correct: 0, total: 0 };
        const prevM = storage.months?.[m] || { sessions: 0, correct: 0, total: 0, topics: {} };
        const updated = {
          ...storage,
          days: { ...storage.days, [d]: { sessions: prev.sessions + 1, correct: prev.correct + correct, total: prev.total + total } },
          months: { ...storage.months, [m]: { sessions: prevM.sessions + 1, correct: prevM.correct + correct, total: prevM.total + total, topics: { ...prevM.topics, [topicId]: (prevM.topics?.[topicId] || 0) + 1 } } },
        };
        const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 7);
        for (const key of Object.keys(updated.days || {})) {
          if (new Date(key) < cutoff) delete updated.days[key];
        }
        saveStorage(updated);
        setScreen("home");
      }

      if (screen === "practice" && selectedTopic)
        return <PracticeScreen topic={selectedTopic} onDone={onSessionDone} onBack={() => setScreen("home")} />;
      if (screen === "history")
        return <HistoryScreen months={months} thisWeek={thisWeek} onBack={() => setScreen("home")} />;

      return <HomeScreen affirmation={AFFIRMATIONS[affIdx]} today={today} thisWeek={thisWeek}
        onStart={(t) => { setSelectedTopic(t); setScreen("practice"); }} onHistory={() => setScreen("history")} />;
    }

    // ── HOME ──
    function HomeScreen({ affirmation, today, thisWeek, onStart, onHistory }) {
      const pct = thisWeek.total > 0 ? Math.round((thisWeek.correct / thisWeek.total) * 100) : 0;
      return (
        <div style={S.page}>
          <div style={S.header}>
            <div style={S.headerTop}>
              <span style={S.logo}>svenska 🇸🇪</span>
              <button onClick={onHistory} style={S.ghostBtn}>تاریخچه</button>
            </div>
            <div style={S.affirmation}>{affirmation}</div>
          </div>

          <div style={S.section}>
            <div style={S.sectionLabel}>مسیرت</div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {GOALS.map(g => <div key={g.id} style={S.goalChip}><span>{g.icon}</span> {g.label}</div>)}
            </div>
          </div>

          <div style={S.section}>
            <div style={S.sectionLabel}>این هفته</div>
            <div style={S.statRow}>
              <Stat label="جلسه" value={thisWeek.sessions} />
              <Stat label="درست" value={thisWeek.correct} />
              <Stat label="دقت" value={thisWeek.total ? `${pct}%` : "—"} highlight />
            </div>
            {thisWeek.total > 0 && <div style={{ marginTop: 10 }}><div style={S.progressBg}><div style={{ ...S.progressFill, width: `${pct}%` }} /></div></div>}
            {today.sessions > 0 && <div style={{ marginTop: 8, fontSize: 12, color: "#82E0AA", direction: "rtl" }}>✓ امروز {today.sessions} جلسه — {today.correct} از {today.total} درست</div>}
          </div>

          <div style={S.section}>
            <div style={S.sectionLabel}>یه موضوع انتخاب کن</div>
            {TOPICS.map(t => (
              <button key={t.id} onClick={() => onStart(t)} style={S.topicBtn}>
                <span style={{ fontSize: 20 }}>{t.icon}</span>
                <div style={{ flex: 1, textAlign: "left" }}>
                  <div style={{ fontWeight: 600, fontSize: 14, color: "#f0f0f0" }}>{t.label}</div>
                  <div style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", marginTop: 2 }}>{t.desc}</div>
                </div>
                <span style={{ color: "#E8A87C", fontSize: 18 }}>›</span>
              </button>
            ))}
          </div>
        </div>
      );
    }

    // ── PRACTICE ──
    function PracticeScreen({ topic, onDone, onBack }) {
      const [phase, setPhase] = useState("loading");
      const [exercises, setExercises] = useState([]);
      const [idx, setIdx] = useState(0);
      const [userAnswer, setUserAnswer] = useState("");
      const [feedback, setFeedback] = useState(null);
      const [results, setResults] = useState([]);
      const [loadErr, setLoadErr] = useState(null);
      const inputRef = useRef(null);

      useEffect(() => { loadExercises(); }, []);
      useEffect(() => { if (phase === "quiz" && inputRef.current) inputRef.current.focus(); }, [phase, idx]);

      async function loadExercises() {
        setPhase("loading"); setLoadErr(null);
        try {
          const prompt = `You are a Swedish language teacher for an SFI C3A student.
Generate exactly 12 fill-in-the-blank or short-answer exercises about: "${topic.label}" (${topic.desc}).

Rules:
- Mix easy and medium difficulty
- Each exercise must have ONE clear correct answer (or 2-3 acceptable variants)
- Instructions in simple English or Swedish
- No multiple choice — student types the answer

Respond ONLY with valid JSON (no markdown, no explanation):
{
  "exercises": [
    {
      "q": "question or sentence with ___ for blank",
      "hint": "short hint in parentheses, optional",
      "answers": ["correct", "also_correct"],
      "explanation": "brief Swedish grammar note in simple English"
    }
  ]
}`;
          // PROXY_URL is your Cloudflare Worker URL
          const PROXY_URL = "https://plugga0svenska.niloofar-jamshidi26.workers.dev";
          const res = await fetch(PROXY_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ messages: [{ role: "user", content: prompt }] }),
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error.message);
          const raw = data.content?.map(c => c.text || "").join("").trim();
          const clean = raw.replace(/```json|```/g, "").trim();
          const parsed = JSON.parse(clean);
          setExercises(parsed.exercises || []);
          setPhase("quiz");
        } catch (e) {
          setLoadErr("مشکلی پیش اومد: " + e.message);
        }
      }

      function checkAnswer() {
        if (!userAnswer.trim()) return;
        const ex = exercises[idx];
        const norm = s => s.trim().toLowerCase().replace(/[.,!?؟]/g, "");
        const isCorrect = ex.answers.some(a => norm(a) === norm(userAnswer));
        setFeedback({ correct: isCorrect, explanation: ex.explanation, correct_answer: ex.answers[0] });
        setResults(r => [...r, { correct: isCorrect }]);
        setPhase("feedback");
      }

      function next() {
        const newResults = [...results];
        if (idx + 1 >= exercises.length) {
          const c = newResults.filter(r => r.correct).length;
          onDone(topic.id, c, exercises.length);
        } else {
          setIdx(i => i + 1);
          setUserAnswer(""); setFeedback(null); setPhase("quiz");
        }
      }

      const ex = exercises[idx];
      const progress = exercises.length > 0 ? (idx / exercises.length) * 100 : 0;

      return (
        <div style={S.page}>
          <div style={S.header}>
            <div style={S.headerTop}>
              <button onClick={onBack} style={S.ghostBtn}>← برگشت</button>
              <span style={{ fontSize: 13, color: "rgba(255,255,255,0.5)" }}>{topic.icon} {topic.label}</span>
            </div>
            {exercises.length > 0 && (
              <div style={{ marginTop: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "rgba(255,255,255,0.4)", marginBottom: 6 }}>
                  <span>{idx + 1} / {exercises.length}</span>
                  <span>{results.filter(r => r.correct).length} درست ✓</span>
                </div>
                <div style={S.progressBg}><div style={{ ...S.progressFill, width: `${progress}%`, transition: "width 0.4s" }} /></div>
              </div>
            )}
          </div>

          <div style={{ padding: "24px 20px" }}>
            {phase === "loading" && (
              <div style={{ textAlign: "center", padding: "60px 0" }}>
                <div style={S.spinner} />
                <p style={{ color: "rgba(255,255,255,0.4)", marginTop: 16, fontSize: 13 }}>داره سوال میسازه...</p>
              </div>
            )}
            {loadErr && (
              <div style={{ textAlign: "center", padding: "40px 0" }}>
                <p style={{ color: "#F1948A", marginBottom: 16, direction: "rtl" }}>{loadErr}</p>
                <button onClick={loadExercises} style={S.primaryBtn}>دوباره تلاش</button>
              </div>
            )}
            {(phase === "quiz" || phase === "feedback") && ex && (
              <div>
                <div style={S.questionBox}>
                  <div style={{ fontSize: 16, color: "#f0f0f0", lineHeight: 1.6, marginBottom: ex.hint ? 10 : 0, direction: "ltr" }}>{ex.q}</div>
                  {ex.hint && <div style={{ fontSize: 12, color: "rgba(255,255,255,0.35)", fontStyle: "italic" }}>({ex.hint})</div>}
                </div>
                <input
                  ref={inputRef}
                  value={userAnswer}
                  onChange={e => setUserAnswer(e.target.value)}
                  onKeyDown={e => { if (e.key === "Enter" && phase === "quiz") checkAnswer(); else if (e.key === "Enter" && phase === "feedback") next(); }}
                  disabled={phase === "feedback"}
                  placeholder="جوابت رو اینجا بنویس..."
                  style={{
                    ...S.input,
                    borderColor: phase === "feedback" ? (feedback?.correct ? "#82E0AA" : "#F1948A") : "rgba(255,255,255,0.15)",
                    background: phase === "feedback" ? (feedback?.correct ? "rgba(130,224,170,0.08)" : "rgba(241,148,138,0.08)") : "rgba(255,255,255,0.05)",
                  }}
                />
                {phase === "feedback" && feedback && (
                  <div style={{ ...S.feedbackBox, borderColor: feedback.correct ? "#82E0AA" : "#F1948A", background: feedback.correct ? "rgba(130,224,170,0.07)" : "rgba(241,148,138,0.07)" }}>
                    <div style={{ fontSize: 15, fontWeight: 700, color: feedback.correct ? "#82E0AA" : "#F1948A", marginBottom: 6, direction: "rtl" }}>
                      {feedback.correct ? "✓ درسته!" : `✗ جواب: ${feedback.correct_answer}`}
                    </div>
                    <div style={{ fontSize: 13, color: "rgba(255,255,255,0.6)", lineHeight: 1.5, direction: "ltr" }}>{feedback.explanation}</div>
                  </div>
                )}
                {phase === "quiz" && <button onClick={checkAnswer} style={{ ...S.primaryBtn, opacity: userAnswer.trim() ? 1 : 0.4 }} disabled={!userAnswer.trim()}>چک کن ›</button>}
                {phase === "feedback" && <button onClick={next} style={S.primaryBtn}>{idx + 1 >= exercises.length ? "پایان جلسه ›" : "بعدی ›"}</button>}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── HISTORY ──
    function HistoryScreen({ months, thisWeek, onBack }) {
      const sortedMonths = Object.entries(months).sort((a, b) => b[0].localeCompare(a[0]));
      const weekPct = thisWeek.total > 0 ? Math.round((thisWeek.correct / thisWeek.total) * 100) : 0;
      const monthNames = { "01":"ژانویه","02":"فوریه","03":"مارس","04":"آوریل","05":"مه","06":"ژوئن","07":"ژوئیه","08":"اوت","09":"سپتامبر","10":"اکتبر","11":"نوامبر","12":"دسامبر" };
      return (
        <div style={S.page}>
          <div style={S.header}>
            <div style={S.headerTop}>
              <button onClick={onBack} style={S.ghostBtn}>← برگشت</button>
              <span style={{ fontSize: 14, color: "rgba(255,255,255,0.6)" }}>دستاوردها</span>
            </div>
          </div>
          <div style={{ padding: "20px" }}>
            <div style={S.card}>
              <div style={S.cardTitle}>این هفته</div>
              <div style={S.statRow}>
                <Stat label="جلسه" value={thisWeek.sessions} />
                <Stat label="سوال" value={thisWeek.total} />
                <Stat label="دقت" value={thisWeek.total ? `${weekPct}%` : "—"} highlight />
              </div>
              {thisWeek.total > 0 && <div style={{ marginTop: 10 }}><div style={S.progressBg}><div style={{ ...S.progressFill, width: `${weekPct}%` }} /></div></div>}
            </div>
            {sortedMonths.length === 0 && <p style={{ color: "rgba(255,255,255,0.3)", textAlign: "center", marginTop: 40, fontSize: 13 }}>هنوز سابقه‌ای ثبت نشده</p>}
            {sortedMonths.map(([key, data]) => {
              const [year, month] = key.split("-");
              const pct = data.total > 0 ? Math.round((data.correct / data.total) * 100) : 0;
              const topTopic = Object.entries(data.topics || {}).sort((a, b) => b[1] - a[1])[0];
              return (
                <div key={key} style={S.card}>
                  <div style={S.cardTitle}>{monthNames[month]} {year}</div>
                  <div style={S.statRow}>
                    <Stat label="جلسه" value={data.sessions} />
                    <Stat label="سوال" value={data.total} />
                    <Stat label="دقت" value={data.total ? `${pct}%` : "—"} highlight />
                  </div>
                  {topTopic && <div style={{ marginTop: 8, fontSize: 12, color: "rgba(255,255,255,0.4)", direction: "rtl" }}>بیشترین تمرین: {TOPICS.find(t => t.id === topTopic[0])?.label || topTopic[0]} ({topTopic[1]} جلسه)</div>}
                </div>
              );
            })}
            <div style={{ ...S.card, background: "rgba(232,168,124,0.07)", borderColor: "rgba(232,168,124,0.2)" }}>
              <div style={{ fontSize: 13, color: "rgba(255,255,255,0.5)", direction: "rtl", lineHeight: 1.7 }}>
                🎯 هر جلسه سوئدی = یه قدم واقعی به<br/>
                <span style={{ color: "#E8A87C" }}>کار جنرال 💼 · گواهینامه 🚗 · مربی شنا 🏊</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function Stat({ label, value, highlight }) {
      return (
        <div style={{ textAlign: "center", flex: 1 }}>
          <div style={{ fontSize: highlight ? 22 : 20, fontWeight: 700, color: highlight ? "#E8A87C" : "#f0f0f0" }}>{value}</div>
          <div style={{ fontSize: 11, color: "rgba(255,255,255,0.35)", marginTop: 2 }}>{label}</div>
        </div>
      );
    }

    const S = {
      page: { minHeight: "100vh", background: "linear-gradient(160deg, #0d1117 0%, #111827 60%, #0d1f2d 100%)", color: "#e0e0e0", fontFamily: "Georgia, serif", maxWidth: 480, margin: "0 auto" },
      header: { padding: "20px 20px 16px", borderBottom: "1px solid rgba(255,255,255,0.07)", background: "rgba(255,255,255,0.02)" },
      headerTop: { display: "flex", justifyContent: "space-between", alignItems: "center" },
      logo: { fontSize: 18, fontWeight: 700, color: "#82E0AA", letterSpacing: "0.05em" },
      ghostBtn: { background: "none", border: "1px solid rgba(255,255,255,0.12)", color: "rgba(255,255,255,0.5)", padding: "6px 12px", borderRadius: 8, cursor: "pointer", fontSize: 12, fontFamily: "inherit" },
      affirmation: { marginTop: 14, fontSize: 13, color: "rgba(255,255,255,0.55)", fontStyle: "italic", lineHeight: 1.5, direction: "rtl", borderLeft: "2px solid #E8A87C", paddingLeft: 10 },
      section: { padding: "18px 20px", borderBottom: "1px solid rgba(255,255,255,0.05)" },
      sectionLabel: { fontSize: 11, color: "rgba(255,255,255,0.3)", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 12, direction: "rtl" },
      statRow: { display: "flex", gap: 8 },
      progressBg: { height: 5, background: "rgba(255,255,255,0.08)", borderRadius: 3 },
      progressFill: { height: "100%", background: "linear-gradient(90deg, #82E0AA, #E8A87C)", borderRadius: 3, transition: "width 0.5s ease" },
      goalChip: { display: "flex", alignItems: "center", gap: 5, background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 20, padding: "5px 12px", fontSize: 12, color: "rgba(255,255,255,0.6)", direction: "rtl" },
      topicBtn: { display: "flex", alignItems: "center", gap: 14, width: "100%", background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 12, padding: "14px 16px", marginBottom: 8, cursor: "pointer", textAlign: "left", fontFamily: "inherit", color: "inherit" },
      questionBox: { background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.09)", borderRadius: 14, padding: "20px", marginBottom: 16, minHeight: 80 },
      input: { width: "100%", border: "1.5px solid rgba(255,255,255,0.15)", borderRadius: 10, padding: "13px 14px", color: "#f0f0f0", fontSize: 15, fontFamily: "inherit", marginBottom: 14, boxSizing: "border-box", transition: "border-color 0.2s", direction: "rtl" },
      feedbackBox: { border: "1px solid", borderRadius: 12, padding: "14px 16px", marginBottom: 16 },
      primaryBtn: { width: "100%", background: "linear-gradient(135deg, #E8A87C, #d4916a)", border: "none", borderRadius: 12, padding: "14px", color: "#1a1008", fontSize: 15, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" },
      card: { background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 14, padding: "16px", marginBottom: 12 },
      cardTitle: { fontSize: 13, color: "rgba(255,255,255,0.4)", marginBottom: 12, direction: "rtl" },
      spinner: { width: 32, height: 32, border: "3px solid rgba(255,255,255,0.1)", borderTop: "3px solid #E8A87C", borderRadius: "50%", animation: "spin 0.8s linear infinite", margin: "0 auto" },
    };

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
    (function generateIcon() {
      const size = 180;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      // Background
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, size, size);
      // Sweden flag
      const flagW = size * 0.72, flagH = flagW * 0.625;
      const flagX = (size - flagW) / 2, flagY = size * 0.1;
      const crossThick = flagH * 0.22;
      const crossX = flagX + flagW * 0.33;
      const crossY = flagY + (flagH - crossThick) / 2;
      ctx.fillStyle = '#006AA7';
      ctx.fillRect(flagX, flagY, flagW, flagH);
      ctx.fillStyle = '#FECC02';
      ctx.fillRect(crossX, flagY, crossThick, flagH);
      ctx.fillRect(flagX, crossY, flagW, crossThick);
      // Label
      ctx.font = 'bold 18px Georgia, serif';
      ctx.fillStyle = '#FECC02';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('svenska', size / 2, flagY + flagH + (size - flagY - flagH) * 0.55);
      const link = document.querySelector('link[rel="apple-touch-icon"]');
      if (link) link.href = canvas.toDataURL('image/png');
    })();
  </script>
</body>
</html>
